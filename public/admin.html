<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Marble Race</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { flex-direction: column; gap: 20px; }
    .admin-box {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 32px;
      width: 340px;
      text-align: center;
    }
    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    .status { font-size: 0.85rem; color: #888; margin-bottom: 20px; min-height: 20px; }
    .marbles-count { font-size: 3rem; font-weight: bold; color: #a78bfa; margin: 12px 0 4px; }
    .marbles-label { font-size: 0.8rem; color: #666; margin-bottom: 28px; }
    .btn { display: block; width: 100%; margin-bottom: 12px; padding: 14px; }
    .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; border-radius: 12px; cursor: pointer; font-size: 1rem; }
    .btn-danger:hover { background: #991b1b; }
    .divider { border: none; border-top: 1px solid #2a2a4a; margin: 20px 0; }
    #game-link { font-size: 0.8rem; color: #555; text-decoration: none; display: block; margin-top: 12px; }
    #game-link:hover { color: #888; }
  </style>
</head>
<body>

<div class="admin-box" id="login-box">
  <h1>🔐 Admin</h1>
  <input type="password" id="pwd" placeholder="Mot de passe" style="
    width:100%; padding:12px; border-radius:10px; border:1px solid #333;
    background:#0d0d1a; color:#fff; font-size:1rem; margin-bottom:14px;
  ">
  <button class="btn btn-primary" onclick="login()" style="border-radius:10px;">Entrer</button>
  <p id="pwd-err" style="color:#ef4444;font-size:0.85rem;margin-top:8px;"></p>
</div>

<div class="admin-box" id="admin-box" style="display:none;">
  <h1>🎱 Admin Race</h1>
  <div class="status" id="status">Connexion…</div>

  <div class="marbles-count" id="count">—</div>
  <div class="marbles-label">billes prêtes</div>

  <button class="btn btn-primary" id="btn-start" onclick="startRace()">🚀 Lancer la course</button>
  <hr class="divider">
  <button class="btn btn-danger" onclick="resetRace()">↺ Réinitialiser</button>

  <a href="/" id="game-link" target="_blank">Voir le jeu ↗</a>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const ADMIN_PWD = localStorage.getItem('admin_pwd') || '';
  let authed = false;

  function login() {
    const pwd = document.getElementById('pwd').value;
    if (pwd === (window.__ADMIN_PWD__ || 'admin1234')) {
      localStorage.setItem('admin_pwd', pwd);
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('admin-box').style.display = 'block';
      initAdmin();
    } else {
      document.getElementById('pwd-err').textContent = 'Mot de passe incorrect';
    }
  }

  // Auto-login si déjà sauvegardé
  if (ADMIN_PWD) {
    document.getElementById('pwd').value = ADMIN_PWD;
    login();
  }

  function initAdmin() {
    const socket = io();
    socket.on('init', ({ followers, raceActive }) => {
      document.getElementById('count').textContent = followers.length;
      document.getElementById('status').textContent = raceActive ? '🟢 Course en cours' : '⚪ En attente';
      if (raceActive) document.getElementById('btn-start').disabled = true;
    });
    socket.on('new_follower', () => {
      const el = document.getElementById('count');
      el.textContent = parseInt(el.textContent || '0') + 1;
    });
    socket.on('race_reset', () => location.reload());

    fetch('/api/state').then(r => r.json()).then(({ followers, raceActive }) => {
      document.getElementById('count').textContent = followers.length;
      document.getElementById('status').textContent = raceActive ? '🟢 Course en cours' : '⚪ En attente';
      if (raceActive) document.getElementById('btn-start').disabled = true;
    });
  }

  async function startRace() {
    document.getElementById('btn-start').disabled = true;
    document.getElementById('status').textContent = '🚀 Départ envoyé…';
    await fetch('/api/start', { method: 'POST' });
    document.getElementById('status').textContent = '🟢 Course en cours';
  }

  async function resetRace() {
    if (!confirm('Réinitialiser la course ?')) return;
    await fetch('/api/reset', { method: 'POST' });
  }
</script>
</body>
</html>
